<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery | Raheel Ali · SynthBeatStudio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #0a0a0f; --surface: #111118; --card: #16161f; --border: #2a2a3a;
      --cyan: #00e5ff; --violet: #7c3aed; --pink: #f472b6;
      --text: #e8e8f0; --muted: #6b6b80;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--ink); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 64px; }
    .nav-logo { font-family: 'Bebas Neue', cursive; font-size: 1.5rem; letter-spacing: 0.1em; text-decoration: none; color: var(--text); }
    .nav-logo span { color: var(--cyan); }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a { font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--cyan); }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
    .hamburger span { width: 24px; height: 2px; background: var(--text); }
    .mobile-menu { display: none; position: fixed; top: 64px; left: 0; right: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.5rem 2rem; flex-direction: column; gap: 1.5rem; z-index: 99; }
    .mobile-menu.open { display: flex; }
    .mobile-menu a { font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-decoration: none; }

    .page-hero { padding: 10rem 2rem 4rem; max-width: 1400px; margin: 0 auto; }
    .page-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--cyan); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem; }
    .page-label::before { content: ''; display: inline-block; width: 2rem; height: 1px; background: var(--cyan); }
    .page-title { font-family: 'Bebas Neue', cursive; font-size: clamp(4rem, 8vw, 8rem); line-height: 0.9; letter-spacing: 0.02em; }
    .page-title span { color: var(--pink); }

    .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem 6rem; }

    .filter-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 3rem; }
    .filter-btn { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid var(--border); color: var(--muted); background: none; padding: 0.5rem 1.2rem; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--pink); color: var(--pink); }

    /* Masonry grid */
    .masonry {
      columns: 4 260px; column-gap: 1rem;
    }
    .masonry-item {
      break-inside: avoid; margin-bottom: 1rem;
      position: relative; overflow: hidden; cursor: pointer;
      border: 1px solid var(--border); transition: border-color 0.3s;
    }
    .masonry-item:hover { border-color: var(--pink); }
    .masonry-item img { width: 100%; display: block; transition: transform 0.4s; }
    .masonry-item:hover img { transform: scale(1.04); }
    .masonry-placeholder {
      width: 100%; background: var(--card);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.5rem; color: var(--muted);
    }
    .masonry-placeholder .icon { font-size: 2rem; opacity: 0.2; }
    .masonry-placeholder p { font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em; }
    .masonry-overlay {
      position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; padding: 1rem;
    }
    .masonry-item:hover .masonry-overlay { opacity: 1; }
    .masonry-caption { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em; color: var(--text); }
    .masonry-cat-badge {
      position: absolute; top: 0.75rem; left: 0.75rem;
      background: var(--pink); color: var(--ink);
      font-family: 'Space Mono', monospace; font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.2rem 0.5rem;
    }

    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); align-items: center; justify-content: center; }
    .lightbox.open { display: flex; }
    .lightbox-inner { position: relative; max-width: 90vw; max-height: 90vh; }
    .lightbox-img { max-width: 100%; max-height: 85vh; object-fit: contain; display: block; }
    .lightbox-placeholder { width: 60vw; height: 60vh; background: var(--card); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; }
    .lightbox-placeholder .icon { font-size: 4rem; opacity: 0.2; }
    .lightbox-close { position: fixed; top: 1.5rem; right: 1.5rem; background: none; border: none; color: var(--text); font-size: 2rem; cursor: pointer; z-index: 10; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
    .lightbox-close:hover { color: var(--pink); }
    .lightbox-nav { position: fixed; top: 50%; transform: translateY(-50%); background: none; border: 1px solid var(--border); color: var(--text); font-size: 1.5rem; cursor: pointer; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .lightbox-nav:hover { border-color: var(--pink); color: var(--pink); }
    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }
    .lightbox-info { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); text-align: center; }
    .lightbox-title { font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; color: var(--text); margin-bottom: 0.25rem; }
    .lightbox-meta { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--muted); }

    .empty-state { grid-column: 1/-1; text-align: center; padding: 5rem 2rem; color: var(--muted); }
    .empty-state p { font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; line-height: 2; }
    .empty-state a { color: var(--pink); text-decoration: none; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--ink); }
    ::-webkit-scrollbar-thumb { background: var(--border); }

    footer { background: var(--surface); border-top: 1px solid var(--border); padding: 3rem 2rem; text-align: center; }
    .footer-logo { font-family: 'Bebas Neue', cursive; font-size: 2rem; letter-spacing: 0.1em; margin-bottom: 0.5rem; }
    .footer-logo span { color: var(--cyan); }
    .footer-sub { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 2rem; }
    .footer-links { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .footer-links a { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: var(--cyan); }
    .footer-copy { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--border); }

    @media (max-width: 900px) { .nav-links { display: none; } .hamburger { display: flex; } .masonry { columns: 2 160px; } }
    @media (max-width: 480px) { .masonry { columns: 1; } }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo"><span>S</span>ynth<span>B</span>eat<span>S</span>tudio</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="music.html">Music</a>
      <a href="gallery.html" class="active">Gallery</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <div class="hamburger" onclick="document.getElementById('mobileMenu').classList.toggle('open')">
      <span></span><span></span><span></span>
    </div>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Home</a><a href="music.html">Music</a>
  <a href="gallery.html">Gallery</a><a href="about.html">About</a><a href="contact.html">Contact</a>
</div>

<div class="page-hero">
  <div class="page-label">Visual Archive</div>
  <h1 class="page-title">PHOTO<br><span>GALLERY</span></h1>
</div>

<div class="container">
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="filterPhotos('all', this)">All</button>
  </div>
  <div class="masonry" id="masonryGrid"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">‹</button>
  <div class="lightbox-inner">
    <div id="lightboxContent"></div>
  </div>
  <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">›</button>
  <div class="lightbox-info">
    <div class="lightbox-title" id="lightboxTitle"></div>
    <div class="lightbox-meta" id="lightboxMeta"></div>
  </div>
</div>

<footer>
  <div class="footer-logo"><span>S</span>ynth<span>B</span>eat<span>S</span>tudio</div>
  <div class="footer-sub">Raheel Ali · Independent Artist</div>
  <div class="footer-links">
    <a href="index.html">Home</a><a href="music.html">Music</a>
    <a href="gallery.html">Gallery</a><a href="about.html">About</a>
    <a href="contact.html">Contact</a><a href="admin.html">Admin</a>
  </div>
  <div class="footer-copy">© 2024 Raheel Ali / SynthBeatStudio. All rights reserved.</div>
</footer>

<script>
  let allPhotos = [];
  let filteredPhotos = [];
  let currentIndex = 0;

  // heights for masonry placeholder variety
  const heights = [180, 240, 200, 280, 160, 220, 300, 190];

  function filterPhotos(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filteredPhotos = cat === 'all' ? [...allPhotos] : allPhotos.filter(p => p.category === cat);
    renderGallery(filteredPhotos);
  }

  function renderGallery(photos) {
    const grid = document.getElementById('masonryGrid');
    if (!photos.length) {
      grid.innerHTML = `<div class="empty-state"><p>No photos yet.<br>Add some from the <a href="admin.html">Admin Panel →</a></p></div>`;
      return;
    }
    grid.innerHTML = photos.map((photo, i) => `
      <div class="masonry-item" onclick="openLightbox(${i})">
        ${photo.image
          ? `<img src="${photo.image}" alt="${photo.title}" loading="lazy">`
          : `<div class="masonry-placeholder" style="height:${heights[i % heights.length]}px"><div class="icon">📷</div><p>No Image</p></div>`
        }
        <div class="masonry-cat-badge">${photo.category}</div>
        <div class="masonry-overlay">
          <span class="masonry-caption">${photo.title}</span>
        </div>
      </div>
    `).join('');
  }

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function lightboxNav(dir) {
    currentIndex = (currentIndex + dir + filteredPhotos.length) % filteredPhotos.length;
    updateLightbox();
  }

  function updateLightbox() {
    const photo = filteredPhotos[currentIndex];
    const content = document.getElementById('lightboxContent');
    content.innerHTML = photo.image
      ? `<img class="lightbox-img" src="${photo.image}" alt="${photo.title}">`
      : `<div class="lightbox-placeholder"><div class="icon">📷</div><p style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--muted);">No image uploaded</p></div>`;
    document.getElementById('lightboxTitle').textContent = photo.title;
    document.getElementById('lightboxMeta').textContent = `${photo.category.toUpperCase()} · ${photo.date} · ${currentIndex + 1} / ${filteredPhotos.length}`;
  }

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
    if (e.key === 'Escape') closeLightbox();
  });

  async function init() {
    allPhotos = await fetch('data/gallery.json').then(r => r.json()).catch(() => []);
    filteredPhotos = [...allPhotos];

    const categories = [...new Set(allPhotos.map(p => p.category))];
    const filterBar = document.getElementById('filterBar');
    categories.forEach(cat => {
      filterBar.innerHTML += `<button class="filter-btn" onclick="filterPhotos('${cat}', this)">${cat}</button>`;
    });

    renderGallery(allPhotos);
  }
  init();
</script>
</body>
</html>
